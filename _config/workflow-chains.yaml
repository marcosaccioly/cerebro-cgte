# ============================================================
# Adicionar uma chain:
#   1. Nomeie pela situacao, nao pelo papel (ex: "transcricao_reuniao_multi_especialista", nao "gestor_para_especialistas").
#   2. Descricao em uma frase.
#   3. Cada step tem from, to, when. Opcional: note (para loop ou comportamento especial).
#   4. Se voce esta adicionando o mesmo step a tres chains, isso e um padrao -- promova para chain propria.
#
# Remover uma chain:
#   Nao remova, a menos que a situacao tenha realmente parado de acontecer. Marque deprecada com comentario.
