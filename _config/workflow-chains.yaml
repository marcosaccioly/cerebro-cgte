# workflow-chains.yaml
#
# Qual proximo-passo e válido a partir de qual estado.
#
# Lendo este arquivo: cada chain e uma sequência nomeada de handoffs. Os "steps"
# descrevem as transições from -> to e a condição que torna aquela transição apropriada.
# Um especialista prestes a enviar um handoff deve olhar aqui para confirmar que o
# destino e um proximo-passo válido. Se o movimento que você quer fazer não esta em
# nenhuma chain, adicione aqui primeiro (Friday review) em vez de quebrar o padrão.
#
# Papéis ativos V0:
#   00_orchestrator | 01_gestor | _bridges/kanboard | _bridges/gitlab
#
# Papéis esqueleto V0 (ativam em V1.X):
#   02_educacao | 03_audiovisual | 04_comunicacao | 05_acessibilidade |
#   06_tech_sistemas | 07_institucional | 08_ciencia

workflow_chains:

  - name: anotar_tarefa_propria
    description: Gestor descreve em linguagem natural uma tarefa nova que ele mesmo vai executar. Vira card no Kanboard após HITL.
    steps:
      - from: 00_orchestrator
        to: 01_gestor
        when: "Demanda nova e trabalho do próprio gestor (não distribuivel)."
      - from: 01_gestor
        to: _bridges/kanboard
        when: "Gestor preencheu kanboard_card_request, aprovou HITL, pronto para criar card."

  - name: distribuir_tarefa
    description: Gestor recebe demanda externa, descreve, indica responsavel. Vira card no Kanboard com assignee após HITL.
    steps:
      - from: 00_orchestrator
        to: 01_gestor
        when: "Demanda nova precisa ser distribuida para a equipe."
      - from: 01_gestor
        to: _bridges/kanboard
        when: "Gestor decidiu o responsavel, preencheu kanboard_card_request, aprovou HITL."

  - name: demanda_extraordinaria
    description: Demanda que não cabe em nenhuma categoria ativa. Orchestrator não roteia sozinho -- pede ao gestor decidir.
    steps:
      - from: 00_orchestrator
        to: 01_gestor
        when: "Categoria do board 47 não cobre a demanda; gestor decide criar / recusar / redirecionar."
      - from: 01_gestor
        to: _bridges/kanboard
        when: "Gestor decidiu criar uma nova categoria ou aceitar como exceção; preencheu kanboard_card_request com a categoria escolhida e aprovou HITL."

