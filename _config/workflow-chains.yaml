# ============================================================
# Adicionar uma chain:
#   1. Nomeie pela situação, não pelo papel (ex: "transcricao_reuniao_multi_especialista", não "gestor_para_especialistas").
#   2. Descrição em uma frase.
#   3. Cada step tem from, to, when. Opcional: note (para loop ou comportamento especial).
#   4. Se você esta adicionando o mesmo step a três chains, isso e um padrão -- promova para chain própria.
#
# Remover uma chain:
#   Não remova, a menos que a situação tenha realmente parado de acontecer. Marque deprecada com comentario.
